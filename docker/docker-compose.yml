services:
  postgres:
    image: postgres:16
    container_name: eaccountant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eaccountantdb
      POSTGRES_USER: eaccountant
      POSTGRES_PASSWORD: eaccountant_password
    ports:
      - "5432:5432"
    volumes:
      - eaccountant_postgres_data:/var/lib/postgresql/data

volumes:
  eaccountant_postgres_data:
